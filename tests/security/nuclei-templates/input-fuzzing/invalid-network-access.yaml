id: invalid-network-access

info:
  name: Invalid network access mode accepted
  author: boilerhouse-security
  severity: medium
  tags: input-validation

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/v1/workloads"
    headers:
      Content-Type: application/json
    body: |
      {
        "workload": {"name": "yolo-network-test", "version": "1.0.0"},
        "image": {"ref": "alpine:latest"},
        "resources": {"vcpus": 1, "memory_mb": 256},
        "network": {"access": "unrestricted"},
        "entrypoint": {"cmd": "/bin/sh"}
      }
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 201"
    # FINDING if: invalid network mode accepted
