id: null-bytes-secret-name

info:
  name: Null bytes accepted in secret name
  author: boilerhouse-security
  severity: medium
  tags: input-validation

http:
  - method: PUT
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/test%00injected"
    headers:
      Content-Type: application/json
    body: '{"value": "test"}'
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 201"
    # FINDING if: null byte in name accepted
