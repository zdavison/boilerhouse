id: empty-tenant-id

info:
  name: Empty tenant ID accepted in claim
  author: boilerhouse-security
  severity: high
  tags: input-validation

flow: |
  http("setup-workload") && http("setup-ready") && http("attack")

http:
  - id: setup-workload
    method: POST
    path:
      - "{{BaseURL}}/api/v1/workloads"
    headers:
      Content-Type: application/json
    body: '{"workload":{"name":"{{workload_name}}","version":"1.0.0"},"image":{"ref":"fake:latest"},"resources":{"vcpus":1,"memory_mb":128},"network":{"access":"none"},"idle":{"action":"hibernate"}}'
    matchers:
      - type: dsl
        dsl:
          - "status_code == 201 || status_code == 409"
        internal: true

  - id: setup-ready
    method: GET
    path:
      - "{{BaseURL}}/api/v1/workloads/{{workload_name}}"
    matchers:
      - type: word
        words:
          - '"ready"'
        internal: true

  - id: attack
    method: POST
    path:
      - "{{BaseURL}}/api/v1/tenants/%00/claim"
      - "{{BaseURL}}/api/v1/tenants//claim"
      - "{{BaseURL}}/api/v1/tenants/%20/claim"
    headers:
      Content-Type: application/json
    body: '{"workload": "{{workload_name}}"}'
    stop-at-first-match: true
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200 || status_code == 201"
    # FINDING if: claim succeeds with empty/null/whitespace tenant ID
