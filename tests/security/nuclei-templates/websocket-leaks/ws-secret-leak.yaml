id: ws-secret-leak

info:
  name: Secrets leaked via WebSocket events
  author: boilerhouse-security
  severity: critical
  tags: secrets,websocket

websocket:
  - address: "{{BaseURL}}/ws"
    inputs:
      - data: ""
    matchers:
      - type: word
        words:
          - "{{secret_value}}"
    # FINDING if: secret value appears in WS event stream
