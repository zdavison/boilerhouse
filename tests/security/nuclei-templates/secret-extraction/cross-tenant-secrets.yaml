id: cross-tenant-secrets

info:
  name: Cross-tenant secret access
  author: boilerhouse-security
  severity: critical
  tags: secrets,tenant-isolation

flow: |
  http("store-a") && http("list-b")

http:
  - id: store-a
    method: PUT
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/private-key"
    headers:
      Content-Type: application/json
    body: '{"value": "{{secret_value}}"}'

  - id: list-b
    method: GET
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_b_id}}/secrets"
    matchers:
      - type: word
        words:
          - "private-key"
    # FINDING if: tenant-A's secret name visible to tenant-B
