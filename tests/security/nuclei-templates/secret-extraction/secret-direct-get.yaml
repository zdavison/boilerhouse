id: secret-direct-get

info:
  name: Secret value retrievable via direct GET
  author: boilerhouse-security
  severity: critical
  tags: secrets,data-leak

flow: |
  http("store") && http("get-direct")

http:
  - id: store
    method: PUT
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/direct-get-test"
    headers:
      Content-Type: application/json
    body: '{"value": "{{secret_value}}"}'

  - id: get-direct
    method: GET
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/direct-get-test"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"
    # FINDING if: secret value returned by direct GET
