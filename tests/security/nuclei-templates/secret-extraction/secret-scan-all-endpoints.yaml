id: secret-scan-all-endpoints

info:
  name: Secret value leaks through API endpoints
  author: boilerhouse-security
  severity: critical
  tags: secrets,data-leak

flow: |
  http("setup-workload") && http("setup-ready") && http("store") && http("scan-workloads") && http("scan-instances") && http("scan-nodes") && http("scan-snapshots") && http("scan-stats") && http("scan-activity")

http:
  - id: setup-workload
    method: POST
    path:
      - "{{BaseURL}}/api/v1/workloads"
    headers:
      Content-Type: application/json
    body: '{"workload":{"name":"{{workload_name}}","version":"1.0.0"},"image":{"ref":"fake:latest"},"resources":{"vcpus":1,"memory_mb":128},"network":{"access":"none"},"idle":{"action":"hibernate"}}'
    matchers:
      - type: dsl
        dsl:
          - "status_code == 201 || status_code == 409"
        internal: true

  - id: setup-ready
    method: GET
    path:
      - "{{BaseURL}}/api/v1/workloads/{{workload_name}}"
    matchers:
      - type: word
        words:
          - '"ready"'
        internal: true

  - id: store
    method: PUT
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/leak-test"
    headers:
      Content-Type: application/json
    body: '{"value": "{{secret_value}}"}'
    matchers:
      - type: dsl
        dsl:
          - "status_code == 201"
        internal: true

  - id: scan-workloads
    method: GET
    path:
      - "{{BaseURL}}/api/v1/workloads"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"

  - id: scan-instances
    method: GET
    path:
      - "{{BaseURL}}/api/v1/instances"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"

  - id: scan-nodes
    method: GET
    path:
      - "{{BaseURL}}/api/v1/nodes"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"

  - id: scan-snapshots
    method: GET
    path:
      - "{{BaseURL}}/api/v1/snapshots"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"

  - id: scan-stats
    method: GET
    path:
      - "{{BaseURL}}/api/v1/stats"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"

  - id: scan-activity
    method: GET
    path:
      - "{{BaseURL}}/api/v1/activity"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"
