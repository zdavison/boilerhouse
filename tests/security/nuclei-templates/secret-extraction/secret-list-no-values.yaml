id: secret-list-no-values

info:
  name: Secret values exposed in list endpoint
  author: boilerhouse-security
  severity: critical
  tags: secrets,data-leak

flow: |
  http("store-secret") && http("list-secrets")

http:
  - id: store-secret
    method: PUT
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets/db-password"
    headers:
      Content-Type: application/json
    body: '{"value": "{{secret_value}}"}'
    matchers:
      - type: status
        status:
          - 201
        internal: true

  - id: list-secrets
    method: GET
    path:
      - "{{BaseURL}}/api/v1/tenants/{{tenant_a_id}}/secrets"
    matchers:
      - type: word
        words:
          - "{{secret_value}}"
    # FINDING if: secret value appears in list response
