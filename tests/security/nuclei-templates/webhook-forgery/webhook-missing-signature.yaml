id: webhook-missing-signature

info:
  name: Webhook accepts request without HMAC signature
  author: boilerhouse-security
  severity: critical
  tags: auth-bypass,webhook

http:
  - method: POST
    path:
      - "{{trigger_base_url}}/hooks/{{webhook_trigger_name}}"
    headers:
      Content-Type: application/json
    body: '{"tenant_id": "attacker", "data": "malicious"}'
    matchers:
      - type: dsl
        dsl:
          - "status_code == 200"
    # FINDING if: webhook dispatches without signature
