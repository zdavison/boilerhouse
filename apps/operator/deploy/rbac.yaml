apiVersion: v1
kind: ServiceAccount
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
rules:
  # CRDs
  - apiGroups: ["boilerhouse.dev"]
    resources:
      - boilerhouseworkloads
      - boilerhousepools
      - boilerhouseclaims
      - boilerhousetriggers
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["boilerhouse.dev"]
    resources:
      - boilerhouseworkloads/status
      - boilerhousepools/status
      - boilerhouseclaims/status
      - boilerhousetriggers/status
    verbs: ["patch"]
  # Managed resources
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  # Secrets (read-only for credential resolution)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: boilerhouse-operator
subjects:
  - kind: ServiceAccount
    name: boilerhouse-operator
    namespace: boilerhouse
