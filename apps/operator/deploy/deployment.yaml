apiVersion: apps/v1
kind: Deployment
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
  labels:
    app: boilerhouse-operator
spec:
  # replicas > 1 requires a shared persistent DB (not emptyDir). Leader election ensures only
  # one replica runs controllers, but each replica rebuilds its own DB on start. Keep at 1
  # until a PVC-backed or external DB is introduced.
  replicas: 1
  selector:
    matchLabels:
      app: boilerhouse-operator
  template:
    metadata:
      labels:
        app: boilerhouse-operator
    spec:
      serviceAccountName: boilerhouse-operator
      containers:
        - name: operator
          image: boilerhouse-operator:latest
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: K8S_TOKEN
              valueFrom:
                secretKeyRef:
                  name: boilerhouse-operator-token
                  key: token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
