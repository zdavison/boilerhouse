apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: boilerhouseclaims.boilerhouse.dev
spec:
  group: boilerhouse.dev
  names:
    kind: BoilerhouseClaim
    listKind: BoilerhouseClaimList
    plural: boilerhouseclaims
    singular: boilerhouseclaim
    shortNames: [bhc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantId
        - name: Workload
          type: string
          jsonPath: .spec.workloadRef
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Endpoint
          type: string
          jsonPath: .status.endpoint.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [tenantId, workloadRef]
              properties:
                tenantId:
                  type: string
                workloadRef:
                  type: string
                resume:
                  type: boolean
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Active, Releasing, Released, Error]
                instanceId:
                  type: string
                endpoint:
                  type: object
                  properties:
                    host:
                      type: string
                    port:
                      type: integer
                source:
                  type: string
                  enum: [pool, cold]
                claimedAt:
                  type: string
                  format: date-time
                detail:
                  type: string
