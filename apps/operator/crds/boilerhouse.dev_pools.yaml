apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: boilerhousepools.boilerhouse.dev
spec:
  group: boilerhouse.dev
  names:
    kind: BoilerhousePool
    listKind: BoilerhousePoolList
    plural: boilerhousepools
    singular: boilerhousepool
    shortNames: [bhp]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Workload
          type: string
          jsonPath: .spec.workloadRef
        - name: Size
          type: integer
          jsonPath: .spec.size
        - name: Ready
          type: integer
          jsonPath: .status.ready
        - name: Phase
          type: string
          jsonPath: .status.phase
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [workloadRef, size]
              properties:
                workloadRef:
                  type: string
                size:
                  type: integer
                  minimum: 0
                maxFillConcurrency:
                  type: integer
                  minimum: 1
            status:
              type: object
              properties:
                ready:
                  type: integer
                warming:
                  type: integer
                phase:
                  type: string
                  enum: [Healthy, Degraded, Error]
