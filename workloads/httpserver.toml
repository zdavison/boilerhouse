[workload]
name = "httpserver"
version = "0.1.0"

[image]
dockerfile = "httpserver/Dockerfile"

[resources]
vcpus = 1
memory_mb = 256

[network]
access = "none"
expose = [{ guest = 8080, host_range = [30000, 31000] }]

[idle]
timeout_seconds = 300
action = "hibernate"

[health]
interval_seconds = 2
unhealthy_threshold = 30

[health.http_get]
path = "/"
port = 8080

[entrypoint]
cmd = "/usr/local/bin/python3"
args = ["-m", "http.server", "8080"]

[metadata]
description = "Python HTTP server for connectivity testing"
