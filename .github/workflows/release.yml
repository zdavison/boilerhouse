name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [bun-linux-x64, bun-linux-arm64]
        include:
          - target: bun-linux-x64
            artifact: boilerhouse-linux-amd64
          - target: bun-linux-arm64
            artifact: boilerhouse-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: >
          bun build --compile
          --target=${{ matrix.target }}
          --define BOILERHOUSE_VERSION='"${{ github.ref_name }}"'
          apps/cli/src/main.ts
          --outfile ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            boilerhouse-linux-amd64/boilerhouse-linux-amd64
            boilerhouse-linux-arm64/boilerhouse-linux-arm64
          generate_release_notes: true
